document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ht:700;line-height:1.1;color:#ffffff\">{{ total }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:relative;flex:1;min-height:0\">\n    <div ref=\"{{ stageRef }}\" style=\"position:absolute;inset:0;z-index:0\"><\u002Fdiv>\n\n    <div style=\"position:absolute;top:16px;left:32px;display:flex;gap:18px;z-index:5;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#9aa6c2\">\n      <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ spaceColor }}\"><\u002Fspan>SPACE<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ timeColor }}\"><\u002Fspan>TIME<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ curledColor }}\"><\u002Fspan>CURLED‑UP<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute;top:16px;right:32px;z-index:5;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9aa6c2;animation:pulseHint 3.4s ease-in-out infinite\">↻ drag to rotate · scroll to zoom<\u002Fdiv>\n\n    <button onclick=\"{{ toggleNote }}\" style=\"position:absolute;top:46px;right:32px;z-index:6;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);color:#cfd8ee;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.5px;padding:7px 12px;border-radius:8px;cursor:pointer\">ⓘ established vs. speculative<\u002Fbutton>\n\n    <sc-if value=\"{{ noteOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;top:84px;right:32px;width:340px;z-index:7;background:rgba(10,16,34,.86);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px 20px;box-shadow:0 18px 50px rgba(0,0,0,.5)\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;color:#7e8cb0;margin-bottom:10px\">WHAT'S SOLID, WHAT'S SPECULATIVE<\u002Fdiv>\n        <p style=\"margin:0;font-size:13px;line-height:1.6;color:#c3cbe0;text-wrap:pretty\">The three dimensions of space and one of time are directly measured and underpin all of modern physics. The extra dimensions are <em>required<\u002Fem> by the mathematics of string and M‑theory, but none has ever been detected. Their existence, their number, and the exact curled‑up shape shown here all remain unconfirmed — this Calabi–Yau is just one of an enormous landscape of possibilities.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"position:absolute;left:34px;bottom:104px;max-width:436px;z-index:5;opacity:1\">\n      <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:12px\">\n        <div style=\"font-size:60px;font-weight:700;line-height:.85;letter-spacing:-2px;color:{{ accent }}\">{{ dimNum }}<\u002Fdiv>\n        <div>\n          <div style=\"font-size:25px;font-weight:600;line-height:1.05\">{{ name }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:{{ accent }};font-weight:500;margin-top:2px\">{{ tagline }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px;margin-bottom:13px;flex-wrap:wrap\">\n        <span style=\"display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1px;padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#cfd8ee\">{{ groupLabel }}<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1px;padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:#cfd8ee\"><span style=\"{{ badgeDotStyle }}\"><\u002Fspan>{{ badgeText }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.5px;color:#8b97b8;margin-bottom:10px\">{{ sub }}<\u002Fdiv>\n      <p style=\"margin:0;font-size:14px;line-height:1.58;color:#d4dbec;text-wrap:pretty\">{{ desc }}<\u002Fp>\n      <div style=\"margin-top:13px;padding-top:13px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:9px\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start\">\n          <span style=\"flex:none;width:62px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;line-height:1.25;letter-spacing:1px;color:{{ accent }};padding-top:2px\">WHY IT MATTERS<\u002Fspan>\n          <span style=\"font-size:12.5px;line-height:1.5;color:#b3bcd6;text-wrap:pretty\">{{ why }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start\">\n          <span style=\"flex:none;width:62px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;line-height:1.25;letter-spacing:1px;color:#8b97b8;padding-top:2px\">SENSE OF SCALE<\u002Fspan>\n          <span style=\"font-size:12.5px;line-height:1.5;color:#b3bcd6;text-wrap:pretty\">{{ scale }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:13px;display:flex;align-items:center;gap:13px;flex-wrap:wrap\">\n        <button onclick=\"{{ toggleMath }}\" style=\"flex:none;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);color:#cfd8ee;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.4px;padding:6px 11px;border-radius:7px;cursor:pointer\">{{ mathLabel }}<\u002Fbutton>\n        <sc-if value=\"{{ mathOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:{{ accent }};letter-spacing:.3px;white-space:nowrap\">{{ eq }}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute;left:0;right:0;bottom:24px;z-index:6;display:flex;justify-content:center;align-items:center;gap:14px\">\n      <button onclick=\"{{ prev }}\" style=\"width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);color:#cfd8ee;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:{{ prevOp }}\">←<\u002Fbutton>\n      <div style=\"display:flex;align-items:center\">\n        <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"11\">\n          <button onclick=\"{{ step.go }}\" style=\"display:flex;align-items:center;justify-content:center;width:33px;height:33px;border-radius:9px;font-family:Sora,sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .25s;border:1px solid {{ step.border }};background:{{ step.bg }};color:{{ step.color }};opacity:{{ step.op }};box-shadow:{{ step.glow }};margin-left:{{ step.gap }}\">{{ step.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <button onclick=\"{{ next }}\" style=\"width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);color:#cfd8ee;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:{{ nextOp }}\">→<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 800 },\n  &quot;colorScheme&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;observatory&quot;, &quot;aurora&quot;, &quot;mono&quot;], &quot;default&quot;: &quot;observatory&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;autoRotate&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;starfield&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { dim: 1, noteOpen: false, mathOpen: false };\n\n  DIMS = [\n    { n:1, name:'Length', group:'space', kind:'line', tagline:'The first direction',\n      sub:'spatial dimension 1 of 3', badge:'experienced', spatial:1, temporal:0,\n      desc:\"Start with a point \\u2014 dimension zero, no size at all. Drag that point along one direction and it sweeps out a line. That sweep IS the first dimension: a single number, how far along, now pins down any position.\",\n      why:\"Position, distance, motion \\u2014 every measurement starts here. Without length there is no 'where.'\", scale:\"Holds at any size, from a hair's width to billions of light-years.\", eq:\"x\" },\n    { n:2, name:'Width', group:'space', kind:'plane', tagline:'A flat world',\n      sub:'spatial dimension 2 of 3', badge:'experienced', spatial:2, temporal:0,\n      desc:\"Take the line from before and sweep the whole thing sideways, at a right angle to itself. The path it traces fills in a flat plane. Each new dimension is made this way \\u2014 by dragging the previous shape in a fresh direction. Two numbers, like a map grid reference, now locate any point.\",\n      why:\"Gives things area and shape \\u2014 maps, screens and cross-sections all live on a plane.\", scale:\"A flat sheet of any size, but with exactly zero thickness.\", eq:\"d = \\u221A(x\\u00B2 + y\\u00B2)\" },\n    { n:3, name:'Depth', group:'space', kind:'cube', tagline:'The space we live in',\n      sub:'spatial dimension 3 of 3', badge:'experienced', spatial:3, temporal:0,\n      desc:\"Now lift the flat plane straight up, perpendicular to its surface. Sweeping it through that third direction puffs it out into a solid volume \\u2014 the everyday space you move through. Three numbers fix any spot in the room around you.\",\n      why:\"Lets objects have volume and sit apart in real space \\u2014 the stage every physical event plays out on.\", scale:\"From subatomic to cosmic \\u2014 the space you actually move through.\", eq:\"d = \\u221A(x\\u00B2 + y\\u00B2 + z\\u00B2)\" },\n    { n:4, name:'Time', group:'time', kind:'time', tagline:'When, not just where',\n      sub:'temporal dimension 1 of 1', badge:'established', spatial:3, temporal:1,\n      desc:\"The same trick, but now we sweep all of 3D space through a new direction: time. Relativity treats that sweep as real geometry, binding the three space directions and time into one fabric \\u2014 spacetime. Every event needs a 'when' as well as a 'where'.\",\n      why:\"Allows change, motion and cause-and-effect; relativity promotes it from a mere label to a genuine dimension.\", scale:\"Blends with space, so fast-moving clocks and rulers disagree about time and distance.\", eq:\"ds\\u00B2 = \\u2212c\\u00B2dt\\u00B2 + dx\\u00B2 + dy\\u00B2 + dz\\u00B2\" },\n    { n:5, name:'Curled Dimension I', group:'curled', kind:'circle', tagline:'Hidden in plain sight',\n      sub:'extra spatial dimension 1 of 7', badge:'speculative', spatial:4, temporal:1,\n      desc:\"Here the pattern changes. A new direction is added just like before \\u2014 but instead of stretching out forever it loops back on itself into a tiny circle at every point of space. That's why we never feel it: like a garden hose that looks like a line from afar but is a tube up close, it's curled smaller than the Planck length (~10\\u207B\\u00B3\\u2075 m). String theory only works if such hidden directions exist.\",\n      why:\"The first hidden direction string theory demands; curling it up explains why we never stumble into it.\", scale:\"Blow an atom up to the size of the solar system and this loop would still be smaller than a grain of sand.\", eq:\"R \\u2248 \\u2113\\u209A \\u2248 1.6 \\u00D7 10\\u207B\\u00B3\\u2075 m\" },\n    { n:6, name:'Curled Dimension II', group:'curled', kind:'torus', tagline:'Two curls combine',\n      sub:'extra spatial dimension 2 of 7', badge:'speculative', spatial:5, temporal:1,\n      desc:\"Add a second curled direction at a right angle to the first \\u2014 sweep that little circle around a second loop. The two circles together trace a doughnut\\u2011shaped surface, a torus. The extra dimensions don't stack in a line; they wrap around each other into ever\\u2011richer tiny shapes.\",\n      why:\"Shows extra dimensions can wrap around one another, not just stack \\u2014 geometry begins to matter.\", scale:\"Two hidden loops, each near the Planck length, woven into a microscopic torus.\", eq:\"T\\u00B2 = S\\u00B9 \\u00D7 S\\u00B9\" },\n    { n:7, name:'Curled Dimension III', group:'curled', kind:'cy', patches:7, tagline:'Folding into shape',\n      sub:'extra spatial dimension 3 of 7', badge:'speculative', spatial:6, temporal:1,\n      desc:\"Adding a third curled direction takes us past anything we can picture as a simple loop or doughnut. The circle and torus now fold together into the start of a far more intricate form. Superstring theory needs six such directions; combined, they build a six\\u2011dimensional Calabi\\u2013Yau manifold \\u2014 here it begins taking shape.\",\n      why:\"Folded the right way, six curled dimensions fix which particles and forces can exist \\u2014 that folding starts here.\", scale:\"Still Planck-tiny, yet already too intricate to picture as a simple loop or ring.\", eq:\"Calabi\\u2013Yau:  R\\u1D62\\u2C7C = 0\" },\n    { n:8, name:'Curled Dimension IV', group:'curled', kind:'cy', patches:13, tagline:'Shape is everything',\n      sub:'extra spatial dimension 4 of 7', badge:'speculative', spatial:7, temporal:1,\n      desc:\"Each curled direction we add no longer stands on its own \\u2014 it deepens the folds of the single shape the previous ones already formed. What matters now is the combined geometry, whose twists and holes are believed to set which particles and forces can exist.\",\n      why:\"The shape's holes and handles act like a wiring diagram for physics \\u2014 rearrange them and the rules change.\", scale:\"Microscopic at every point of space; its twists, not its size, carry the meaning.\", eq:\"c\\u2081(M) = 0\" },\n    { n:9, name:'Curled Dimension V', group:'curled', kind:'cy', patches:19, tagline:'A landscape of forms',\n      sub:'extra spatial dimension 5 of 7', badge:'speculative', spatial:8, temporal:1,\n      desc:\"The fifth extra direction folds in too, sharpening the manifold's curves further still. Change the way these dimensions wrap and you'd get a different shape \\u2014 and different physics. There may be an astronomical number of possible Calabi\\u2013Yau forms.\",\n      why:\"There may be a staggering number of allowed shapes \\u2014 the 'landscape' that makes our laws hard to predict.\", scale:\"One of perhaps 10\\u2075\\u2070\\u2070 shapes this tiny space could secretly take.\", eq:\"~10\\u2075\\u2070\\u2070 possible vacua\" },\n    { n:10, name:'Curled Dimension VI', group:'curled', kind:'cy', patches:25, tagline:'The Calabi\\u2013Yau, whole',\n      sub:'extra spatial dimension 6 of 7 \\u2014 manifold complete', badge:'speculative', spatial:9, temporal:1,\n      desc:\"The sixth curled direction completes the set: all six fold together into a finished Calabi\\u2013Yau, a whole six\\u2011dimensional space tucked into every point of the universe. Added to the 3 large space dimensions and time, this is superstring theory's full count \\u2014 nine of space, one of time, ten in all.\",\n      why:\"Completes superstring theory. Remarkably, the shape's Euler number \\u03C7 \\u2014 essentially a count of its holes \\u2014 fixes how many families of matter particles the universe contains.\", scale:\"A whole six-dimensional world folded smaller than any particle we can probe.\", eq:\"generations = \\u00BD |\\u03C7|\" },\n    { n:11, name:'The 11th Dimension', group:'curled', kind:'branes', tagline:'String theory grows up',\n      sub:'extra spatial dimension 7 of 7 \\u2014 the M\\u2011theory dimension', badge:'speculative', spatial:10, temporal:1,\n      desc:\"One more direction added to the ten reveals something new. In 1995 the five rival string theories turned out to be facets of one deeper theory \\u2014 M\\u2011theory \\u2014 needing an 11th dimension. Unlike the curled six, this one can open a gap between vast sheets called 'branes'; our whole universe may sit on one. Final tally: ten dimensions of space, one of time.\",\n      why:\"Unifies the five string theories into one. Crank up the string coupling g\\u209B and this hidden direction grows \\u2014 which is exactly how it was discovered \\u2014 making room for membranes our universe may ride on.\", scale:\"Can stay microscopic, or open wide enough to separate two universe-sized branes.\", eq:\"R\\u2081\\u2081 \\u221D g\\u209B^(2/3)\" }\n  ];\n\n  schemeColors(){\n    const s = this.props.colorScheme || 'observatory';\n    const M = {\n      observatory:{ space:'#5ec8f2', time:'#f0b35a', curled:'#b98cf0' },\n      aurora:{ space:'#4fd0c0', time:'#f2c14e', curled:'#e87fd0' },\n      mono:{ space:'#a9e0fb', time:'#6fc0f0', curled:'#5a8fe0' }\n    };\n    return M[s] || M.observatory;\n  }\n  col(g){ return this.schemeColors()[g]; }\n\n  componentDidMount(){\n    this._key = (e)=>{ if(e.key==='ArrowRight') this.next(); else if(e.key==='ArrowLeft') this.prev(); };\n    window.addEventListener('keydown', this._key);\n    this.waitThree(()=> this.initThree());\n  }\n  componentWillUnmount(){\n    window.removeEventListener('keydown', this._key);\n    if(this._raf) cancelAnimationFrame(this._raf);\n    if(this._cleanup) this._cleanup();\n    if(this.ro) this.ro.disconnect();\n    if(this.renderer){ this.renderer.dispose(); }\n  }\n  componentDidUpdate(){\n    if(!this.scene) return;\n    const scheme = this.props.colorScheme || 'observatory';\n    const star = (this.props.starfield ?? true);\n    if(this._lastDim !== this.state.dim || this._lastScheme !== scheme){ this.buildDim(this.state.dim); }\n    if(this._lastStar !== star && this.stars){ this.stars.visible = star; }\n    this._lastDim = this.state.dim; this._lastScheme = scheme; this._lastStar = star;\n  }\n\n  waitThree(cb){\n    if(window.THREE){ cb(); return; }\n    let n=0; const id=setInterval(()=>{ if(window.THREE){ clearInterval(id); cb(); } else if(++n>120){ clearInterval(id); } }, 50);\n  }\n\n  initThree(){\n    const T = window.THREE; this.T = T;\n    const el = this.mountEl; if(!el) return;\n    const w = el.clientWidth || 1, h = el.clientHeight || 1;\n    const renderer = new T.WebGLRenderer({ antialias:true, alpha:true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setSize(w, h); renderer.setClearColor(0x000000, 0);\n    el.appendChild(renderer.domElement); this.renderer = renderer;\n\n    this.scene = new T.Scene();\n    this.camera = new T.PerspectiveCamera(50, w/h, 0.1, 1000);\n    this.camDist = 6; this.camera.position.set(0, 1.0, 6); this.camera.lookAt(0,0,0);\n\n    this.scene.add(new T.AmbientLight(0xffffff, 0.55));\n    const p1 = new T.PointLight(0x88bbff, 0.95); p1.position.set(5,6,9); this.scene.add(p1);\n    const p2 = new T.PointLight(0xffaa66, 0.55); p2.position.set(-6,-3,4); this.scene.add(p2);\n\n    this.stars = this.makeStars(); this.stars.visible = (this.props.starfield ?? true); this.scene.add(this.stars);\n    this.stage = new T.Group(); this.scene.add(this.stage);\n\n    this.targetRotX = 0.26; this.targetRotY = 0.6;\n    this._lastDim = this.state.dim; this._lastScheme = this.props.colorScheme || 'observatory'; this._lastStar = (this.props.starfield ?? true);\n    this.buildDim(this.state.dim);\n    this.bindControls();\n\n    this.ro = new ResizeObserver(()=> this.resize()); this.ro.observe(el);\n    const loop = ()=>{ this._raf = requestAnimationFrame(loop); this.tick(); renderer.render(this.scene, this.camera); };\n    loop();\n  }\n\n  bindControls(){\n    const dom = this.renderer.domElement;\n    dom.style.cursor = 'grab'; dom.style.touchAction = 'none';\n    const down = (e)=>{ this.dragging=true; dom.style.cursor='grabbing'; this.lx=e.clientX; this.ly=e.clientY; };\n    const move = (e)=>{ if(!this.dragging) return; const dx=e.clientX-this.lx, dy=e.clientY-this.ly; this.lx=e.clientX; this.ly=e.clientY; this.targetRotY += dx*0.006; this.targetRotX = Math.max(-1.25, Math.min(1.25, this.targetRotX + dy*0.006)); };\n    const up = ()=>{ this.dragging=false; dom.style.cursor='grab'; };\n    const wheel = (e)=>{ e.preventDefault(); this.camDist = Math.max(3, Math.min(16, this.camDist + e.deltaY*0.012)); };\n    dom.addEventListener('pointerdown', down); window.addEventListener('pointermove', move); window.addEventListener('pointerup', up); dom.addEventListener('wheel', wheel, { passive:false });\n    this._cleanup = ()=>{ dom.removeEventListener('pointerdown', down); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); dom.removeEventListener('wheel', wheel); };\n  }\n\n  resize(){ if(!this.renderer||!this.mountEl) return; const w=this.mountEl.clientWidth, h=this.mountEl.clientHeight; this.renderer.setSize(w,h); this.camera.aspect=w/h; this.camera.updateProjectionMatrix(); }\n\n  tick(){\n    if(!this.stage) return;\n    const now = performance.now();\n    if(!this.dragging && (this.props.autoRotate ?? true)) this.targetRotY += 0.0026;\n    this.stage.rotation.y += (this.targetRotY - this.stage.rotation.y) * 0.08;\n    this.stage.rotation.x += (this.targetRotX - this.stage.rotation.x) * 0.08;\n    this.camera.position.z += (this.camDist - this.camera.position.z) * 0.1;\n    this.camera.lookAt(0,0,0);\n    if(this.sweepDot){ const p = (now*0.00035) % 1; this.sweepDot.position.x = -2.5 + p*5; }\n    if(this.pulseObj){ const s = 1 + 0.07*Math.sin(now*0.004); this.pulseObj.scale.setScalar(s); }\n  }\n\n  // ---- material / primitive helpers ----\n  lmat(hex, op){ return new this.T.LineBasicMaterial({ color:hex, transparent:true, opacity:op, blending:this.T.AdditiveBlending }); }\n  emat(hex, inten){ return new this.T.MeshStandardMaterial({ color:hex, emissive:hex, emissiveIntensity:inten, roughness:0.4, metalness:0.1 }); }\n  seg(a, b, mat){ const g=new this.T.BufferGeometry(); g.setAttribute('position', new this.T.Float32BufferAttribute([a[0],a[1],a[2],b[0],b[1],b[2]],3)); return new this.T.Line(g, mat); }\n  ring(c, r, axis, hex, op){ const pts=[]; const seg=44; for(let i=0;i<=seg;i++){ const t=i/seg*Math.PI*2; let p; if(axis==='x') p=[0,Math.cos(t)*r,Math.sin(t)*r]; else if(axis==='y') p=[Math.cos(t)*r,0,Math.sin(t)*r]; else p=[Math.cos(t)*r,Math.sin(t)*r,0]; pts.push(c[0]+p[0],c[1]+p[1],c[2]+p[2]); } const g=new this.T.BufferGeometry(); g.setAttribute('position', new this.T.Float32BufferAttribute(pts,3)); return new this.T.Line(g, this.lmat(hex,op)); }\n  cpow(re, im, p){ const r=Math.hypot(re,im), th=Math.atan2(im,re), rr=Math.pow(r,p), a=th*p; return [rr*Math.cos(a), rr*Math.sin(a)]; }\n\n  clearStage(){ const T=this.T; if(!this.stage) return; for(let i=this.stage.children.length-1;i>=0;i--){ const o=this.stage.children[i]; o.traverse(c=>{ if(c.geometry) c.geometry.dispose(); if(c.material){ (Array.isArray(c.material)?c.material:[c.material]).forEach(m=>m.dispose()); } }); this.stage.remove(o); } this.sweepDot=null; this.pulseObj=null; }\n\n  buildDim(dim){\n    if(!this.stage) return;\n    this.clearStage();\n    const d = this.DIMS[dim-1];\n    const dist = { line:6, plane:6.2, cube:5.6, time:7.6, circle:6.6, torus:5, cy:5.4, branes:8.4 }[d.kind] || 6;\n    this.camDist = dist; this.targetRotX = 0.26;\n    const fn = { line:'makeLine', plane:'makePlane', cube:'makeCube', time:'makeTime', circle:'makeCircle', torus:'makeTorus', cy:'makeCY', branes:'makeBranes' }[d.kind];\n    if(d.kind==='cy') this.makeCY(d.patches); else this[fn]();\n  }\n\n  makeStars(){ const T=this.T; const N=900, pos=[]; for(let i=0;i<N;i++){ const r=7+Math.random()*42, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1); pos.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph)); } const g=new T.BufferGeometry(); g.setAttribute('position', new T.Float32BufferAttribute(pos,3)); return new T.Points(g, new T.PointsMaterial({ color:0xcdd8ff, size:0.13, transparent:true, opacity:0.8, sizeAttenuation:true })); }\n\n  makeLine(){ const T=this.T, c=this.col('space'); const rod=new T.Mesh(new T.CylinderGeometry(0.014,0.014,5,10), this.emat(c,0.7)); rod.rotation.z=Math.PI/2; this.stage.add(rod); const dot=new T.Mesh(new T.SphereGeometry(0.1,18,18), this.emat(c,1.3)); this.stage.add(dot); this.sweepDot=dot; [-2.5,2.5].forEach(x=>{ const t=new T.Mesh(new T.SphereGeometry(0.05,12,12), this.emat(c,0.9)); t.position.x=x; this.stage.add(t); }); }\n\n  makePlane(){ const T=this.T, c=this.col('space'); const g=new T.Group(); const N=10, s=0.5, ext=N*s/2; for(let i=-N/2;i<=N/2;i++){ g.add(this.seg([i*s,-ext,0],[i*s,ext,0], this.lmat(c,0.5))); g.add(this.seg([-ext,i*s,0],[ext,i*s,0], this.lmat(c,0.5))); } const fill=new T.Mesh(new T.PlaneGeometry(N*s,N*s), new T.MeshBasicMaterial({color:c,transparent:true,opacity:0.04})); g.add(fill); this.stage.add(g); }\n\n  makeCube(){ const T=this.T, c=this.col('space'); const box=new T.BoxGeometry(2.6,2.6,2.6); this.stage.add(new T.LineSegments(new T.EdgesGeometry(box), this.lmat(c,0.95))); this.stage.add(new T.Mesh(box, new T.MeshBasicMaterial({color:c,transparent:true,opacity:0.05}))); }\n\n  makeTime(){ const T=this.T, cT=this.col('time'); this.stage.add(this.seg([-3.4,0,0],[3.4,0,0], this.lmat(cT,0.5))); const box=new T.BoxGeometry(1.35,1.35,1.35); for(let k=0;k<6;k++){ const e=new T.LineSegments(new T.EdgesGeometry(box), new T.LineBasicMaterial({color:cT,transparent:true,opacity:0.18+0.14*k,blending:T.AdditiveBlending})); e.position.x = -2.7 + k*1.08; this.stage.add(e); if(k===5) this.pulseObj=e; } }\n\n  makeCircle(){ const T=this.T, cS=this.col('space'), cC=this.col('curled'); this.stage.add(this.seg([-3.4,0,0],[3.4,0,0], this.lmat(cS,0.4))); const N=24; for(let i=0;i<N;i++){ const x=-3.2 + (i/(N-1))*6.4; this.stage.add(this.ring([x,0,0],0.13,'x',cC,0.7)); } this.stage.add(this.ring([0,1.7,0],0.55,'x',cC,1.0)); const surf=new T.Mesh(new T.TorusGeometry(0.55,0.012,8,48), this.emat(cC,0.8)); surf.position.set(0,1.7,0); surf.rotation.y=Math.PI/2; this.stage.add(surf); }\n\n  makeTorus(){ const T=this.T, cC=this.col('curled'); const geo=new T.TorusGeometry(1.3,0.5,20,52); this.stage.add(new T.LineSegments(new T.WireframeGeometry(geo), this.lmat(cC,0.45))); this.stage.add(new T.Mesh(geo, new T.MeshStandardMaterial({color:cC,emissive:cC,emissiveIntensity:0.28,roughness:0.5,metalness:0.2,transparent:true,opacity:0.26,side:T.DoubleSide}))); }\n\n  makeCY(patches){ const T=this.T, n=5, segs=16, proj=Math.PI/4, bm=Math.PI/2; const sc=this.schemeColors(); const base=new T.Color(sc.curled); const hsl={}; base.getHSL(hsl); const pairs=[]; for(let k1=0;k1<n;k1++) for(let k2=0;k2<n;k2++) pairs.push([k1,k2]); const show=Math.min(patches||25, pairs.length); const g=new T.Group(); for(let pi=0;pi<show;pi++){ const k1=pairs[pi][0], k2=pairs[pi][1]; const verts=[], idx=[]; for(let ii=0;ii<=segs;ii++){ const a=(ii/segs)*(Math.PI/2); for(let jj=0;jj<=segs;jj++){ const b=-bm+(jj/segs)*2*bm; const cre=Math.cos(a)*Math.cosh(b), cim=-Math.sin(a)*Math.sinh(b); const sre=Math.sin(a)*Math.cosh(b), sim=Math.cos(a)*Math.sinh(b); const p1=this.cpow(cre,cim,2/n), p2=this.cpow(sre,sim,2/n); const ph1=2*Math.PI*k1/n, ph2=2*Math.PI*k2/n; const Z1r=p1[0]*Math.cos(ph1)-p1[1]*Math.sin(ph1), Z1i=p1[0]*Math.sin(ph1)+p1[1]*Math.cos(ph1); const Z2r=p2[0]*Math.cos(ph2)-p2[1]*Math.sin(ph2), Z2i=p2[0]*Math.sin(ph2)+p2[1]*Math.cos(ph2); verts.push(Z1r, Z2r, Math.cos(proj)*Z1i+Math.sin(proj)*Z2i); } } const row=segs+1; for(let ii=0;ii<segs;ii++) for(let jj=0;jj<segs;jj++){ const A=ii*row+jj,B=A+1,C=A+row,D=C+1; idx.push(A,C,B,B,C,D); } const geo=new T.BufferGeometry(); geo.setAttribute('position', new T.Float32BufferAttribute(verts,3)); geo.setIndex(idx); geo.computeVertexNormals(); const c=new T.Color().setHSL((hsl.h + (k1-2)*0.012 + (k2-2)*0.008 + 1)%1, Math.min(0.92, hsl.s+0.08), 0.5 + 0.06*((k1+k2)%3)); g.add(new T.Mesh(geo, new T.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.42,roughness:0.45,metalness:0.25,side:T.DoubleSide,transparent:true,opacity:0.9}))); g.add(new T.LineSegments(new T.WireframeGeometry(geo), new T.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.05}))); } g.scale.setScalar(2.0); this.stage.add(g); }\n\n  makeBranes(){ const T=this.T, cS=this.col('space'), cC=this.col('curled'), cT=this.col('time'); const mk=(z,col)=>{ const grp=new T.Group(); const N=6,s=0.62,ext=N*s/2; for(let i=-N/2;i<=N/2;i++){ grp.add(this.seg([i*s,-ext,z],[i*s,ext,z], this.lmat(col,0.5))); grp.add(this.seg([-ext,i*s,z],[ext,i*s,z], this.lmat(col,0.5))); } const fill=new T.Mesh(new T.PlaneGeometry(N*s,N*s), new T.MeshBasicMaterial({color:col,transparent:true,opacity:0.05})); fill.position.z=z; grp.add(fill); return grp; }; this.stage.add(mk(-1.4,cS)); this.stage.add(mk(1.4,cC)); for(let k=0;k<4;k++) this.stage.add(this.ring([-1.1+k*0.72,0.85,-1.4],0.14,'z',cS,0.95)); for(let k=0;k<5;k++){ const x=-1.2+k*0.6; this.stage.add(this.seg([x,-0.35,-1.4],[x,-0.35,1.4], this.lmat(cT,0.35))); } const arrow=this.seg([1.95,-1.65,-1.4],[1.95,-1.65,1.4], this.lmat(cT,1.0)); this.stage.add(arrow); [[-1.4,-1],[1.4,1]].forEach(p=>{ const tip=new T.Mesh(new T.SphereGeometry(0.07,10,10), this.emat(cT,1.0)); tip.position.set(1.95,-1.65,p[0]); this.stage.add(tip); }); }\n\n  prev(){ this.setState(s=>({ dim: Math.max(1, s.dim-1) })); }\n  next(){ this.setState(s=>({ dim: Math.min(11, s.dim+1) })); }\n  goTo(n){ this.setState({ dim:n }); }\n\n  renderVals(){\n    if(!this._stageRef) this._stageRef = (el)=>{ this.mountEl = el; };\n    const sc = this.schemeColors();\n    const i = this.state.dim - 1;\n    const d = this.DIMS[i];\n    const accent = sc[d.group];\n    const groupLabels = { space:'SPACE', time:'TIME', curled:'CURLED-UP SPACE' };\n    const badgeMap = { experienced:'DIRECTLY EXPERIENCED', established:'ESTABLISHED PHYSICS', speculative:'THEORETICAL \\u00B7 UNOBSERVED' };\n    const filled = d.badge !== 'speculative';\n    const badgeDotStyle = filled\n      ? ('width:7px;height:7px;border-radius:50%;background:'+accent)\n      : ('width:7px;height:7px;border-radius:50%;border:1.5px solid '+accent+';box-sizing:border-box');\n    const steps = this.DIMS.map((dd, k)=>{\n      const active = (k===i); const col = sc[dd.group];\n      return {\n        label: String(dd.n),\n        bg: active ? col : 'rgba(255,255,255,0.02)',\n        border: col, color: active ? '#06080f' : col,\n        op: active ? '1' : '0.55', glow: active ? ('0 0 18px '+col) : 'none',\n        gap: dd.n===1 ? '0px' : ((dd.n===4||dd.n===5) ? '20px' : '7px'),\n        go: ()=> this.goTo(dd.n)\n      };\n    });\n    return {\n      stageRef: this._stageRef,\n      dimNum: String(d.n).padStart(2,'0'),\n      name: d.name, tagline: d.tagline, desc: d.desc, sub: d.sub,\n      accent, groupLabel: groupLabels[d.group], badgeText: badgeMap[d.badge], badgeDotStyle,\n      why: d.why, scale: d.scale, eq: d.eq,\n      mathOpen: !!this.state.mathOpen,\n      mathLabel: this.state.mathOpen ? '\\u0192  hide the math' : '\\u0192  show the math',\n      toggleMath: ()=> this.setState(s=>({ mathOpen: !s.mathOpen })),\n      spatial: String(d.spatial), temporal: String(d.temporal), total: String(d.spatial + d.temporal),\n      spaceColor: sc.space, timeColor: sc.time, curledColor: sc.curled,\n      steps, prev: ()=>this.prev(), next: ()=>this.next(),\n      toggleNote: ()=> this.setState(s=>({ noteOpen: !s.noteOpen })),\n      noteOpen: !!this.state.noteOpen,\n      prevOp: this.state.dim===1 ? '0.3' : '1', nextOp: this.state.dim===11 ? '0.3' : '1'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
